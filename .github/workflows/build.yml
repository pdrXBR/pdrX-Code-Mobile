name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # O segredo está aqui: dar permissão e usar o Wrapper do projeto
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: Build APK
        run: bash ./gradlew assembleDebug -x externalNativeBuild
        
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdrXCodeMobile-1.0
          path: app/build/outputs/apk/debug/*.apk
